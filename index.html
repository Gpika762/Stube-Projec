<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stube - 2016 Edition</title>
    <style>
       
        body { background-color: #f1f1f1; font-family: Roboto, Arial, sans-serif; margin: 0; padding: 0; }
        
        /* Barra de navegación superior */
        #navbar { 
            background: #fff; height: 50px; border-bottom: 1px solid #e8e8e8; 
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; position: fixed; width: 100%; top: 0; z-index: 100;
        }
        .logo-area { display: flex; align-items: center; font-weight: bold; color: #cc0000; font-size: 20px; }
        .search-bar { 
            display: flex; border: 1px solid #ccc; border-radius: 2px;
            overflow: hidden; width: 40%; max-width: 600px; background: #fff;
        }
        .search-bar input { border: none; padding: 5px 10px; width: 100%; outline: none; }
        .search-bar button { background: #f8f8f8; border-left: 1px solid #ccc; border: none; padding: 0 15px; cursor: pointer; }

        /* Contenedor Principal */
        #main-content { margin-top: 70px; display: flex; justify-content: center; }
        
        /* Grilla de Videos */
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); 
            gap: 20px; max-width: 1100px; width: 90%; padding-bottom: 50px;
        }

        /* Card de Video estilo 2016 */
        .video-card { cursor: pointer; background: #fff; padding-bottom: 10px; border-bottom: 1px solid #ddd; }
        .thumb-container { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
        .thumb-container img { position: absolute; top: 0; width: 100%; height: 100%; object-fit: cover; }
        .duration { 
            position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.8); 
            color: #fff; font-size: 11px; padding: 2px 4px; font-weight: bold;
        }
        .video-info { padding: 8px; }
        .video-title { 
            font-size: 14px; color: #167ac6; font-weight: 500; 
            line-height: 1.3em; margin-bottom: 4px; display: block; text-decoration: none;
            height: 36px; overflow: hidden;
        }
        .video-meta { font-size: 11px; color: #767676; line-height: 1.4; }

        /* Reproductor Overlay */
        #player-layer { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 1000; text-align: center;
        }
        #player-layer video { width: 100%; max-width: 800px; margin-top: 60px; background: #000; }
        .close-btn { color: white; position: absolute; top: 15px; right: 20px; font-size: 35px; cursor: pointer; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="navbar">
        <div class="logo-area">Stube</div>
        <div class="search-bar">
            <input type="text" id="busqueda" placeholder="Buscar">
            <button onclick="realizarBusqueda()">🔍</button>
        </div>
        <div style="width: 40px;"></div>
    </div>

    <div id="main-content">
        <div class="video-grid" id="contenedor-videos">
            </div>
    </div>

    <div id="player-layer">
        <span class="close-btn" onclick="closePlayer()">&times;</span>
        <video id="main-video" controls>
            Tu navegador no soporta el reproductor.
        </video>
    </div>

    <script>
        // 1. Al cargar la página, muestra videos de tecnología por defecto
        window.onload = () => { realizarBusqueda('samsung galaxy s classic'); };

        // 2. Función para buscar videos en el servidor de Render
        async function realizarBusqueda(termino) {
            const query = termino || document.getElementById('busqueda').value;
            if (!query) return;

            const grid = document.getElementById('contenedor-videos');
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Cargando videos...</p>';

            try {
                // El fetch usa la ruta relativa /api/search para que funcione en Render
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const videos = await response.json();
                
                grid.innerHTML = ''; // Limpiar mensaje de carga

                videos.forEach(v => {
                    grid.innerHTML += `
                        <div class="video-card" onclick="cargarYPlay('${v.id}')">
                            <div class="thumb-container">
                                <img src="${v.thumb}" alt="">
                                <div class="duration">${v.duration}</div>
                            </div>
                            <div class="video-info">
                                <a class="video-title">${v.title}</a>
                                <div class="video-meta">${v.author}<br>${v.views.toLocaleString()} vistas • ${v.ago}</div>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: red;">Error al conectar con el servidor.</p>';
            }
        }

        // 3. Función para obtener el link REAL del video y reproducir
        async function cargarYPlay(id) {
            try {
                const response = await fetch(`/api/play?id=${id}`);
                const data = await response.json();
                
                if (data.url) {
                    openPlayer(data.url);
                } else {
                    alert("No se pudo obtener el link del video.");
                }
            } catch (e) {
                alert("Error de conexión con el servidor de video.");
            }
        }

        function openPlayer(url) {
            var playerLayer = document.getElementById('player-layer');
            var video = document.getElementById('main-video');
            video.src = url;
            playerLayer.style.display = 'block';
            video.play();
        }

        function closePlayer() {
            var playerLayer = document.getElementById('player-layer');
            var video = document.getElementById('main-video');
            video.pause();
            video.src = ""; // Limpia el video para ahorrar memoria
            playerLayer.style.display = 'none';
        }

        // Permitir buscar al presionar "Enter"
        document.getElementById('busqueda').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') realizarBusqueda();
        });
    </script>
</body>
</html>
